services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-startupfair}
      POSTGRES_USER: ${POSTGRES_USER:-startupfair}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-startupfair_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-startupfair} -d ${POSTGRES_DB:-startupfair}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./.env:/src/.env:ro
    environment:
      PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://startupfair:startupfair_password@db:5432/startupfair?sslmode=disable}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      - backend
    expose:
      - "80"

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    depends_on:
      - frontend
      - backend
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
