name: Build Docker Images

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.DOCKERHUB_USERNAME != '' && format('{0}/startup-fair-backend:latest', env.DOCKERHUB_USERNAME) || 'startup-fair-backend:latest' }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.DOCKERHUB_USERNAME != '' && format('{0}/startup-fair-frontend:latest', env.DOCKERHUB_USERNAME) || 'startup-fair-frontend:latest' }}

      - name: Build proxy image
        uses: docker/build-push-action@v6
        with:
          context: ./proxy
          file: ./proxy/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.DOCKERHUB_USERNAME != '' && format('{0}/startup-fair-proxy:latest', env.DOCKERHUB_USERNAME) || 'startup-fair-proxy:latest' }}
